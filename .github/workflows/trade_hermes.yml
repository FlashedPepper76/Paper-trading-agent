name: Hermes Trading Bot (news-catalyst / event-driven)

on:
  # Triggered by a Supabase pg_cron job ('hermes-trigger') — see trade.yml
  # for why this no longer uses GitHub's native `schedule:` trigger.
  # Intended cadence is every 15 minutes during market hours, same as
  # Plutus/Helios (see instructions_hermes.md and schedule.py); regardless
  # of how often this external trigger actually fires, main.py itself now
  # self-throttles real decision runs to ~15 minutes apart via
  # ai_agent.should_throttle_cadence(), so a faster or misconfigured
  # trigger can no longer burn through Gemini/Groq quota or cause
  # more-frequent-than-intended trading.
  workflow_dispatch:
    inputs:
      source:
        description: "Internal: set to 'schedule' by the Supabase cron caller. Leave blank for a manual run."
        required: false

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run trading bot (Hermes)
        env:
          AGENT_ID: hermes
          RUN_TRIGGER: ${{ github.event.inputs.source || github.event_name }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY_HERMES }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY_HERMES }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_HERMES }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_HERMES_2 }}
          GROQ_API_KEY: ${{ secrets.GROK_API_KEY_2 }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          NOTIFY_SECRET: ${{ secrets.NOTIFY_SECRET }}
        run: python main.py
