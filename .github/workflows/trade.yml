name: Paper Trading Bot

on:
  schedule:
    # Every minute, weekdays, 13:00-21:00 UTC.
    # That window covers 9:30am-4:00pm ET with a buffer on both sides so it
    # works across the EST/EDT switch without needing two separate cron
    # entries. main.py double-checks Alpaca's market clock and exits
    # immediately on weekends/holidays/outside actual market hours.
    # Note: GitHub doesn't guarantee exact timing on scheduled workflows —
    # runs can be delayed under high platform load, so "every minute" is
    # the request, not a hard guarantee.
    - cron: "* 13-21 * * 1-5"
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run trading bot
        env:
          AGENT_ID: plutus
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          NOTIFY_SECRET: ${{ secrets.NOTIFY_SECRET }}
        run: python main.py
