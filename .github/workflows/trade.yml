name: Paper Trading Bot

on:
  # Triggered every minute during market hours by a Supabase pg_cron job
  # (see the trigger_github_workflow() function + 'plutus-trigger' cron job
  # in the life-dashboard Supabase project), since GitHub's own native
  # `schedule:` trigger never once fired for this repo despite being
  # correctly configured — a known, occasionally-occurring GitHub-side
  # flakiness. Deliberately not using `schedule:` here anymore so there's
  # no chance of double-firing if GitHub's scheduler ever starts working.
  workflow_dispatch:
    inputs:
      source:
        description: "Internal: set to 'schedule' by the Supabase cron caller. Leave blank for a manual run."
        required: false

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run trading bot
        env:
          AGENT_ID: plutus
          RUN_TRIGGER: ${{ github.event.inputs.source || github.event_name }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          NOTIFY_SECRET: ${{ secrets.NOTIFY_SECRET }}
        run: python main.py
