name: Manual Full Agent Run (bypasses market-hours check)

on:
  workflow_dispatch:
    inputs:
      agent_id:
        description: "Which agent to run"
        required: true
        default: "plutus"
        type: choice
        options:
          - plutus
          - helios
          - hermes
      mode:
        description: "run = normal forced run, premarket = test the pre-market review"
        required: false
        default: "run"
        type: choice
        options:
          - run
          - premarket
      extra_context:
        description: "Optional free-text context injected into the agent's prompt for this run only"
        required: false
        default: ""
        type: string

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Force-run trading agent (ignores market-hours check)
        env:
          AGENT_ID: ${{ inputs.agent_id }}
          RUN_MODE: ${{ inputs.mode }}
          RUN_TRIGGER: ${{ github.event_name }}
          ALPACA_API_KEY: ${{ inputs.agent_id == 'hermes' && secrets.ALPACA_API_KEY_HERMES || inputs.agent_id == 'helios' && secrets.ALPACA_API_KEY_HELIOS || secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ inputs.agent_id == 'hermes' && secrets.ALPACA_SECRET_KEY_HERMES || inputs.agent_id == 'helios' && secrets.ALPACA_SECRET_KEY_HELIOS || secrets.ALPACA_SECRET_KEY }}
          GEMINI_API_KEY: ${{ inputs.agent_id == 'hermes' && secrets.GEMINI_API_KEY_HERMES || inputs.agent_id == 'helios' && secrets.GEMINI_API_KEY_HELIOS || secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ inputs.agent_id == 'hermes' && secrets.GEMINI_API_KEY_HERMES_2 || inputs.agent_id == 'helios' && secrets.GEMINI_API_KEY_HELIOS_2 || secrets.GEMINI_API_KEY_2 }}
          GROQ_API_KEY: ${{ inputs.agent_id == 'hermes' && secrets.GROK_API_KEY_2 || inputs.agent_id == 'helios' && secrets.GROQ_API_KEY_HELIOS || secrets.GROQ_API_KEY }}
          EXTRA_CONTEXT: ${{ inputs.extra_context }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          NOTIFY_SECRET: ${{ secrets.NOTIFY_SECRET }}
        run: PYTHONPATH=. python scripts/manual_agent_run.py
