name: Manual Full Agent Run (bypasses market-hours check)

on:
  workflow_dispatch:
    inputs:
      agent_id:
        description: "Which agent to run"
        required: true
        default: "plutus"
        type: choice
        options:
          - plutus
          - helios

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Force-run trading agent (ignores market-hours check)
        env:
          AGENT_ID: ${{ inputs.agent_id }}
          RUN_TRIGGER: ${{ github.event_name }}
          ALPACA_API_KEY: ${{ inputs.agent_id == 'helios' && secrets.ALPACA_API_KEY_HELIOS || secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ inputs.agent_id == 'helios' && secrets.ALPACA_SECRET_KEY_HELIOS || secrets.ALPACA_SECRET_KEY }}
          GEMINI_API_KEY: ${{ inputs.agent_id == 'helios' && secrets.GEMINI_API_KEY_HELIOS || secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          NOTIFY_SECRET: ${{ secrets.NOTIFY_SECRET }}
        run: PYTHONPATH=. python scripts/manual_agent_run.py
