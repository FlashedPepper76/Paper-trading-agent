name: Test Gemini Connectivity

on:
  workflow_dispatch:
    inputs:
      agent_id:
        description: "Which agent's Gemini key to test"
        required: true
        default: "plutus"
        type: choice
        options:
          - plutus
          - helios

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Test Gemini call
        id: test_call
        continue-on-error: true
        env:
          AGENT_ID: ${{ inputs.agent_id }}
          ALPACA_API_KEY: ${{ inputs.agent_id == 'helios' && secrets.ALPACA_API_KEY_HELIOS || secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ inputs.agent_id == 'helios' && secrets.ALPACA_SECRET_KEY_HELIOS || secrets.ALPACA_SECRET_KEY }}
          GEMINI_API_KEY: ${{ inputs.agent_id == 'helios' && secrets.GEMINI_API_KEY_HELIOS || secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: PYTHONPATH=. python scripts/test_gemini.py

      - name: Commit result
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_gemini_test.json
          git commit -m "Gemini connectivity test result" || echo "no changes to commit"
          git push

      - name: Fail job if test failed
        if: steps.test_call.outcome == 'failure'
        run: exit 1
