name: Helios Trading Bot (long-horizon / capital preservation)

on:
  # Triggered by a Supabase pg_cron job ('helios-trigger') — see trade.yml
  # for why this no longer uses GitHub's native `schedule:` trigger.
  # Intended cadence is every 15 minutes during market hours, same as
  # Plutus/Hermes (see instructions_helios.md) — Helios moved off its
  # original once-daily cadence on 2026-06-29. Regardless of how often
  # this trigger actually fires, main.py self-throttles real decision runs
  # to ~15 minutes apart via ai_agent.should_throttle_cadence().
  workflow_dispatch:
    inputs:
      source:
        description: "Internal: set to 'schedule' by the Supabase cron caller. Leave blank for a manual run."
        required: false

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run trading bot (Helios)
        env:
          AGENT_ID: helios
          RUN_TRIGGER: ${{ github.event.inputs.source || github.event_name }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY_HELIOS }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY_HELIOS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_HELIOS }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_HELIOS_2 }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY_HELIOS }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          NOTIFY_SECRET: ${{ secrets.NOTIFY_SECRET }}
        run: python main.py
